name: Build Teddy AI APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create fresh Flutter project and copy our code
        run: |
          flutter create --org com.teddyai --project-name teddy_ai temp_project
          cp -r lib temp_project/
          cp -r assets temp_project/
          cp pubspec.yaml temp_project/
          echo "SUNBIRD_API_KEY=${{ secrets.SUNBIRD_API_KEY }}" > temp_project/.env

      - name: Install dependencies
        run: |
          cd temp_project
          flutter pub get

      - name: Build APK
        run: |
          cd temp_project
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: teddy-ai-apk
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk