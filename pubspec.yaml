name: teddy_ai
description: Teddy AI - Uganda's AI Assistant powered by Sunbird AI
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Networking
  http: ^1.2.0
  # Local storage
  shared_preferences: ^2.2.2
  # Audio recording & playback
  record: ^5.1.0
  audioplayers: ^6.0.0
  # Permissions
  permission_handler: ^11.3.0
  # File handling
  path_provider: ^2.1.2
  # Unique IDs
  uuid: ^4.3.3
  # Environment variables
  flutter_dotenv: ^5.1.0
  # Notifications
  flutter_local_notifications: ^17.1.2
  # Date formatting
  intl: ^0.19.0
  # Markdown rendering
  flutter_markdown: ^0.6.18

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/knowledge/
